name: bd

services:

  db:
    image: postgres:16
    container_name: bd_db
    environment:
      POSTGRES_DB: flights_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    networks:
      - bd-network
    # Al primo avvio, il database aspetta qualche secondo per finire di configurarsi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flights_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bd_backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://postgres:password@db:5432/flights_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - bd-network

networks:
  bd-network:
    driver: bridge
